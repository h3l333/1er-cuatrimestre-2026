<!doctype html>
<html lang="es">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<title>Asignar Responsable a Empresa</title>
		<style>
			:root {
				--primary: #2c3e50;
				--accent: #3498db;
				--bg: #f4f7f6;
				--error: #e74c3c;
				--success: #2ecc71;
			}

			body {
				font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
				background-color: var(--bg);
				color: var(--primary);
				display: flex;
				justify-content: center;
				padding: 20px;
			}

			.container {
				background: white;
				padding: 30px;
				border-radius: 8px;
				box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
				max-width: 650px;
				width: 100%;
			}

			h2 {
				border-bottom: 2px solid var(--accent);
				padding-bottom: 10px;
			}

			.form-group {
				margin-bottom: 15px;
			}

			label {
				display: block;
				margin-bottom: 5px;
				font-weight: bold;
			}

			input,
			select {
				width: 100%;
				padding: 10px;
				border: 1px solid #ddd;
				border-radius: 4px;
				box-sizing: border-box;
			}

			.row {
				display: flex;
				gap: 10px;
			}

			.row div {
				flex: 1;
			}

			.btn-submit {
				background-color: var(--accent);
				color: white;
				border: none;
				padding: 12px;
				border-radius: 4px;
				cursor: pointer;
				width: 100%;
				font-size: 16px;
				margin-top: 20px;
			}

			.btn-submit:hover {
				background-color: #2980b9;
			}

			.message {
				margin-top: 15px;
				padding: 10px;
				border-radius: 4px;
				display: none;
			}

			.error {
				background-color: #fdecea;
				color: var(--error);
			}

			.success {
				background-color: #eafaf1;
				color: var(--success);
			}

			.box {
				background: #eef2f3;
				padding: 10px;
				border-radius: 4px;
				margin-bottom: 15px;
			}
		</style>
	</head>
	<body>
		<div class="container">
			<h2>Asignar Responsable a Empresa</h2>
			<p>Seleccione la empresa y asocie un responsable.</p>

			<form id="formAsignacion">
				<div class="form-group">
					<label for="empresa">Empresa</label>
					<select id="empresa" required>
						<option value="">-- Seleccione empresa --</option>
						<option value="1">Tech Corp</option>
						<option value="2">Data Solutions</option>
					</select>
				</div>

				<div class="box">
					<label>Responsables actuales</label>
					<ul id="listaResponsables">
						<li>Juan Pérez</li>
					</ul>
				</div>

				<div class="form-group">
					<label for="tipo">Tipo de acción</label>
					<select id="tipo" required>
						<option value="">-- Seleccione --</option>
						<option value="nuevo">Nuevo Responsable</option>
						<option value="existente">Vincular Existente</option>
					</select>
				</div>

				<div id="datosNuevo" style="display: none">
					<div class="form-group">
						<label for="nombre">Nombre</label>
						<input type="text" id="nombre" />
					</div>

					<div class="form-group">
						<label for="email">Email</label>
						<input type="text" id="email" />
					</div>

					<div class="form-group">
						<label for="areas">Áreas de conocimiento</label>
						<input type="text" id="areas" placeholder="Ej: Sistemas, Datos" />
					</div>
				</div>

				<div id="datosExistente" style="display: none">
					<div class="form-group">
						<label for="responsableExistente">Responsable</label>
						<select id="responsableExistente">
							<option value="">-- Seleccione --</option>
							<option value="r1">Juan Pérez</option>
							<option value="r2">Ana Gómez</option>
						</select>
					</div>
				</div>

				<button type="submit" class="btn-submit">Confirmar Asignación</button>

				<div id="mensaje" class="message"></div>
			</form>
		</div>

		<script>
			const tipo = document.getElementById("tipo");
			const datosNuevo = document.getElementById("datosNuevo");
			const datosExistente = document.getElementById("datosExistente");
			const mensaje = document.getElementById("mensaje");

			tipo.addEventListener("change", () => {
				datosNuevo.style.display = tipo.value === "nuevo" ? "block" : "none";
				datosExistente.style.display =
					tipo.value === "existente" ? "block" : "none";
			});

			document
				.getElementById("formAsignacion")
				.addEventListener("submit", function (e) {
					e.preventDefault();

					mensaje.style.display = "none";
					mensaje.className = "message";

					const empresa = document.getElementById("empresa").value;
					const tipoVal = tipo.value;

					if (!empresa) {
						mensaje.textContent = "Error: Debe seleccionar una empresa válida.";
						mensaje.classList.add("error");
						mensaje.style.display = "block";
						return;
					}

					if (tipoVal === "nuevo") {
						const nombre = document.getElementById("nombre").value.trim();
						const email = document.getElementById("email").value.trim();
						const areas = document.getElementById("areas").value.trim();

						if (!nombre || !email || !areas) {
							mensaje.textContent =
								"Error: Debe completar todos los datos del responsable.";
							mensaje.classList.add("error");
							mensaje.style.display = "block";
							return;
						}
					}

					if (tipoVal === "existente") {
						const resp = document.getElementById("responsableExistente").value;

						if (!resp) {
							mensaje.textContent = "Error: Debe seleccionar un responsable.";
							mensaje.classList.add("error");
							mensaje.style.display = "block";
							return;
						}

						if (resp === "r1") {
							mensaje.textContent =
								"Error: El responsable ya está asociado a la empresa.";
							mensaje.classList.add("error");
							mensaje.style.display = "block";
							return;
						}
					}

					if (!confirm("¿Desea confirmar la asignación?")) return;

					mensaje.textContent =
						"Responsable asignado correctamente a la empresa.";
					mensaje.classList.add("success");
					mensaje.style.display = "block";

					document.getElementById("formAsignacion").reset();
					datosNuevo.style.display = "none";
					datosExistente.style.display = "none";
				});
		</script>
	</body>
</html>
